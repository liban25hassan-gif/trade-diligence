// ── Scoring ──
function calcScore(e) {
  const ch = CHECKS.filter(c => c.for.includes(e.type));
  const passed = ch.filter(c => e.verifications?.[c.id]?.status === 'pass').length;
  const fc = (e.flags||[]).length;
  const hf = (e.flags||[]).filter(f => { const r = FLAGS.find(x => x.id===f); return r?.sev==='high'; }).length;
  const cs = ch.length > 0 ? (passed/ch.length)*60 : 30;
  const fp = Math.min(40, hf*15 + (fc-hf)*5);
  return Math.max(0, Math.min(100, Math.round(cs + 40 - fp)));
}
function getRating(s) { return s >= 70 ? 'green' : s >= 40 ? 'yellow' : 'red'; }

// ── PDF Text Extraction ──
async function extractPdfText(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
  let fullText = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(' ');
    fullText += `--- Page ${i} ---\n${pageText}\n\n`;
  }
  return fullText;
}

async function extractFileText(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'pdf') return await extractPdfText(file);
  if (['txt','csv','json','xml','html'].includes(ext)) return await file.text();
  return `[File: ${file.name}, Type: ${file.type}, Size: ${(file.size/1024).toFixed(1)} KB — Image/binary file. Text extraction not available.]`;
}

async function aiChat(prompt, sys='') {
  if (!GKEY) return {error:true,text:'No API key.'};
  try {
    const messages = [];
    if (sys) messages.push({role:'system',content:sys});
    messages.push({role:'user',content:prompt});
    const res = await fetch(GURL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GKEY},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages,temperature:0.3,max_tokens:4096})});
    const data = await res.json();
    if (data.error) return {error:true,text:data.error.message};
    return {error:false,text:data.choices?.[0]?.message?.content||'No response'};
  } catch(err) { return {error:true,text:err.message}; }
}

  const prompt = `Write a comprehensive due diligence report:

ENTITY: ${entity.name}
TYPE: ${ETYPES.find(t=>t.v===entity.type)?.l || entity.type}

- Signing Officer: ${p.signingOfficer||'Not provided'}
- Industry: ${p.industry||'Not provided'}
- Website: ${p.website||'Not provided'}

KYC STATUS: ${kyc.length} documents (${kyc.filter(k=>k.status==='verified').length} verified, ${kyc.filter(k=>k.status==='pending').length} pending)
${kyc.map(k=>`- ${k.docType}: ${k.status}${k.expiry?' (Expires: '+k.expiry+')':''}`).join('\n')}

VERIFICATION CHECKS (${passed.length}/${checks.length}):
Passed: ${passed.map(c=>c.label).join(', ')||'None'}
Outstanding: ${failed.map(c=>c.label).join(', ')||'None'}

RED FLAGS (${activeFlags.length}):
${activeFlags.map(f=>`- [${f.sev.toUpperCase()}] ${f.label}`).join('\n')||'None'}

DOCUMENTS SCANNED: ${(entity.docs||[]).length}
${(entity.docs||[]).map(d=>`- ${d.type}: Score ${d.scanResult?.score||'N/A'}, ${d.scanResult?.rating||'N/A'}`).join('\n')||'None'}

${entity.fuelScamCheck ? `FUEL SCAMMER CROSS-REF: Risk ${entity.fuelScamCheck.riskLevel}\nIndicators: ${(entity.fuelScamCheck.scamIndicators||[]).join(', ')}` : ''}
${entity.scoResult ? `SCO VERIFICATION: Score ${entity.scoResult.score}, ${entity.scoResult.rating}` : ''}
${entity.lcResult ? `LC VERIFICATION: Score ${entity.lcResult.score}, ${entity.lcResult.rating}, UCP: ${entity.lcResult.ucpCompliance}` : ''}

Write these sections:
1. EXECUTIVE SUMMARY

  doc.text(entity.name,mx,y); y+=8;
  doc.setFontSize(10); doc.setTextColor(138,130,114);
  doc.text(`${ETYPES.find(t=>t.v===entity.type)?.l||entity.type} | ${entity.commodity||'N/A'} | ${entity.country||'N/A'}`,mx,y); y+=6;

  const sc=rating==='green'?[34,197,94]:rating==='yellow'?[234,179,8]:[239,68,68];
  doc.setFillColor(26,25,22); doc.roundedRect(mx,y,cw,16,3,3,'F');
  doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(...sc);
  doc.text(`RISK SCORE: ${score}/100 — ${rating.toUpperCase()}`,mx+6,y+10); y+=24;

  doc.setTextColor(200,192,176); doc.setFont('helvetica','normal'); doc.setFontSize(9);
  for (const line of reportText.split('\n')) {
    if (y>ph-25){doc.addPage();y=20;}
    const t=line.trim(); if(!t){y+=4;continue;}
    const isH=/^(\d+\.\s+)?[A-Z][A-Z &/]+$/.test(t)||/^#{1,3}\s/.test(t);
    if(isH){y+=4;doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(168,134,62);doc.text(t.replace(/^#{1,3}\s*/,''),mx,y);y+=6;doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(200,192,176);continue;}
    const iB=/^[-•*]\s/.test(t); const bx=iB?mx+4:mx; const bw=iB?cw-4:cw;
    for(const wl of doc.splitTextToSize(t,bw)){
      if(y>ph-25){doc.addPage();y=20;}
      if(/\b(HIGH|CRITICAL|MATCH|REJECTED)\b/i.test(wl))doc.setTextColor(239,68,68);
      else if(/\b(MEDIUM|CAUTION|POTENTIAL)\b/i.test(wl))doc.setTextColor(234,179,8);
      else if(/\b(LOW|CLEAR|PASS|VERIFIED)\b/i.test(wl))doc.setTextColor(34,197,94);
      else doc.setTextColor(200,192,176);
      doc.text(wl,bx,y);y+=4.5;
    }
    y+=1;
  }

  const pg=doc.internal.getNumberOfPages();
  for(let i=1;i<=pg;i++){doc.setPage(i);doc.setFontSize(7);doc.setTextColor(100,96,88);doc.text('Trade Diligence — Confidential',mx,ph-8);doc.text(`Page ${i} of ${pg}`,pw-mx,ph-8,{align:'right'});doc.setFillColor(168,134,62);doc.rect(0,ph-4,pw,1,'F');}
  doc.save(`Trade_Diligence_${entity.name.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`);
}

function FileDropZone({onFiles,accept,multiple=true,disabled=false}){
  const [dragOver,setDragOver]=useState(false); const ref=useRef();
  const handleDrop=useCallback(e=>{e.preventDefault();setDragOver(false);if(disabled)return;const f=Array.from(e.dataTransfer.files);if(f.length)onFiles(f);},[onFiles,disabled]);
  return <div><div className={`drop-zone ${dragOver?'drag-over':''}`} onDrop={handleDrop} onDragOver={e=>{e.preventDefault();if(!disabled)setDragOver(true);}} onDragLeave={e=>{e.preventDefault();setDragOver(false);}} onClick={()=>!disabled&&ref.current?.click()} style={{opacity:disabled?0.5:1,cursor:disabled?'not-allowed':'pointer'}}>
    <div style={{fontSize:28,marginBottom:8,opacity:0.4}}>📎</div>
    <div style={{fontSize:13,fontWeight:500,color:T.tx,marginBottom:4}}>Drop files here or click to browse</div>
    <div style={{fontSize:11,color:T.td}}>PDF, TXT, CSV, JSON, XML</div>
  </div><input ref={ref} type="file" multiple={multiple} accept={accept||'.pdf,.txt,.csv,.json,.xml,.html'} style={{display:'none'}} onChange={e=>{const f=Array.from(e.target.files);if(f.length)onFiles(f);e.target.value='';}}/></div>;
}
function FileChips({files,onRemove}){
  if(!files?.length)return null;
  const icons={pdf:'📕',txt:'📄',csv:'📊',json:'📋',xml:'📰'};
  return <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:10}}>
    {files.map((f,i)=>{const ext=f.name?.split('.').pop().toLowerCase()||'?';return <div key={i} className="file-chip"><span>{icons[ext]||'📄'}</span><span style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span><span style={{fontSize:10,color:T.td}}>({(f.size/1024).toFixed(0)}KB)</span>{onRemove&&<span className="remove" onClick={()=>onRemove(i)}>✕</span>}</div>;})}
  </div>;
}

// ── Editable Field ──
function Field({label,value,onChange,type='text',placeholder='',options,half,readonly}){

  if(options) return <div style={wrap}><label style={s.lbl}>{label}</label><select style={s.sel} value={value||''} onChange={e=>onChange(e.target.value)} disabled={readonly}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select></div>;
  if(type==='textarea') return <div style={wrap}><label style={s.lbl}>{label}</label><textarea style={s.ta} value={value||''} onChange={e=>onChange(e.target.value)} placeholder={placeholder} readOnly={readonly}/></div>;
  return <div style={wrap}><label style={s.lbl}>{label}</label><input style={s.inp} type={type} value={value||''} onChange={e=>onChange(e.target.value)} placeholder={placeholder} readOnly={readonly}/></div>;
}

// ── Entity Detail ──
function Detail({entity,onUpdate,onBack}){
  const [tab,setTab]=useState('overview');
  const [aiL,setAiL]=useState(null);
  const [aiR,setAiR]=useState(null);
  const [dType,setDType]=useState('LOI');
  const [pendingFiles,setPendingFiles]=useState([]);
  const [extracting,setExtracting]=useState(false);
  const [report,setReport]=useState(null);
  const [reportLoading,setReportLoading]=useState(false);
  const [showReport,setShowReport]=useState(false);
  const [dTxt,setDTxt]=useState('');
  const [scoTxt,setScoTxt]=useState('');
  const [lcTxt,setLcTxt]=useState('');
  const [kycType,setKycType]=useState('Passport');
  const [kycFiles,setKycFiles]=useState([]);
  const [kycExpiry,setKycExpiry]=useState('');

  const score=calcScore(entity); const rating=getRating(score);
  const checks=CHECKS.filter(c=>c.for.includes(entity.type));
  const eFlags=FLAGS.filter(r=>(entity.flags||[]).includes(r.id));
  const profile=entity.profile||{};
  const kycDocs=entity.kycDocs||[];

  const setProfile=(k,v)=>onUpdate({...entity,profile:{...profile,[k]:v}});
  const togFlag=id=>{const fl=entity.flags||[];onUpdate({...entity,flags:fl.includes(id)?fl.filter(f=>f!==id):[...fl,id]});};
  const togCheck=id=>{const v={...entity.verifications};v[id]=v[id]?.status==='pass'?{status:'pending'}:{status:'pass',date:new Date().toISOString()};onUpdate({...entity,verifications:v});};

  const doSanctions=async()=>{setAiL('s');const r=await screenSanctions(entity.name,entity.type,entity.country);onUpdate({...entity,sanctionsResults:[...(entity.sanctionsResults||[]),{...r,date:new Date().toISOString(),list:'Combined'}]});setAiR({t:'s',d:r});setAiL(null);};
  const doVerify=async()=>{setAiL('v');const r=await verifyEnt(entity.name,entity.type,{country:entity.country,commodity:entity.commodity,...profile});setAiR({t:'v',d:r});setAiL(null);};

  const doFileScan=async()=>{
    if(!pendingFiles.length&&!dTxt.trim())return;setAiL('d');const nd=[];
    for(const file of pendingFiles){setExtracting(true);let text;try{text=await extractFileText(file);}catch(err){text=`[Error: ${err.message}]`;}setExtracting(false);
      const result=await scanDoc(text,dType,entity.name,entity.country,entity.commodity);nd.push({type:dType,scanResult:result,date:new Date().toISOString(),fileName:file.name,fileSize:file.size,extractedText:text.slice(0,500)});}
    if(dTxt.trim()&&!pendingFiles.length){const result=await scanDoc(dTxt,dType,entity.name,entity.country,entity.commodity);nd.push({type:dType,scanResult:result,date:new Date().toISOString(),fileName:'Pasted text',extractedText:dTxt.slice(0,500)});}
    onUpdate({...entity,docs:[...(entity.docs||[]),...nd]});setAiR({t:'d',d:nd});setPendingFiles([]);setDTxt('');setAiL(null);};

  const doFuelScam=async()=>{setAiL('fuel');const r=await crossRefFuelScammer(entity);onUpdate({...entity,fuelScamCheck:r});setAiL(null);};
  const doSCO=async()=>{if(!scoTxt.trim())return;setAiL('sco');const r=await verifySCO(entity,scoTxt);onUpdate({...entity,scoResult:r});setScoTxt('');setAiL(null);};
  const doLC=async()=>{if(!lcTxt.trim())return;setAiL('lc');const r=await verifyLC(entity,lcTxt);onUpdate({...entity,lcResult:r});setLcTxt('');setAiL(null);};

  const doKycUpload=async()=>{
    if(!kycFiles.length)return;setAiL('kyc');const newDocs=[];
    for(const file of kycFiles){setExtracting(true);let text;try{text=await extractFileText(file);}catch(err){text=`[Error: ${err.message}]`;}setExtracting(false);
      const analysis=await analyzeKycDoc(text,kycType,entity.name);
      newDocs.push({id:Date.now().toString()+Math.random(),docType:kycType,fileName:file.name,status:analysis.status==='verified'?'verified':analysis.status==='rejected'?'rejected':'pending',expiry:kycExpiry||analysis.extractedInfo?.expiryDate||'',uploadDate:new Date().toISOString(),analysis});}
    onUpdate({...entity,kycDocs:[...kycDocs,...newDocs]});setKycFiles([]);setKycExpiry('');setAiL(null);};

  const updateKycStatus=(id,status)=>{const updated=kycDocs.map(k=>k.id===id?{...k,status}:k);onUpdate({...entity,kycDocs:updated});};
  const removeKyc=id=>{onUpdate({...entity,kycDocs:kycDocs.filter(k=>k.id!==id)});};

  const doReport=async()=>{setReportLoading(true);const r=await generateFullReport(entity);setReport(r);setShowReport(true);setReportLoading(false);};

  const isFuel = (entity.commodity||'').toLowerCase().match(/diesel|fuel|blco|bonny|mazut|bitumen|jet/);

  function expiryClass(d){if(!d)return '';const diff=(new Date(d)-new Date())/(1000*60*60*24);return diff<0?'exp-crit':diff<30?'exp-warn':'exp-ok';}
  function expiryLabel(d){if(!d)return'No expiry set';const diff=Math.round((new Date(d)-new Date())/(1000*60*60*24));return diff<0?`Expired ${Math.abs(diff)}d ago`:diff<30?`Expires in ${diff}d`:`Valid (${diff}d)`;}

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
      <button style={{...s.btn,...s.bs,...s.sm}} onClick={onBack}>← Back</button>

    </div>

    <div style={s.card}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div><div style={{fontSize:20,fontWeight:700,marginBottom:4}}>{entity.name}</div>
          <div style={s.row}><Badge color={T.g}>{ETYPES.find(t=>t.v===entity.type)?.l}</Badge><Badge color={RC[rating]}>{rating.toUpperCase()}</Badge>{entity.commodity&&<span style={s.mut}>{entity.commodity}</span>}{entity.country&&<span style={s.mut}>· {entity.country}</span>}</div>
        </div><ScoreCircle score={score}/>
      </div>
    </div>

    <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>
      {['overview','checks','flags','docs','sanctions','ai'].map(t=><Tab key={t} active={tab===t} onClick={()=>setTab(t)}>{t==='docs'?'Documents':t.charAt(0).toUpperCase()+t.slice(1)}</Tab>)}
    </div>

    {/* ═══ OVERVIEW TAB ═══ */}
    {tab==='overview'&&<div>
      {/* Stats */}
      <div style={s.card}>
        <div style={s.g2}>
          <div><span style={s.mut}>Checks passed</span><div style={{fontSize:20,fontWeight:700,marginTop:4}}>{checks.filter(c=>entity.verifications?.[c.id]?.status==='pass').length}/{checks.length}</div></div>
          <div><span style={s.mut}>Red flags</span><div style={{fontSize:20,fontWeight:700,marginTop:4,color:eFlags.length>0?'#ef4444':'#22c55e'}}>{eFlags.length}</div></div>
          <div><span style={s.mut}>Documents</span><div style={{fontSize:20,fontWeight:700,marginTop:4}}>{(entity.docs||[]).length}</div></div>
          <div><span style={s.mut}>KYC Docs</span><div style={{fontSize:20,fontWeight:700,marginTop:4,color:kycDocs.filter(k=>k.status==='verified').length===kycDocs.length&&kycDocs.length>0?'#22c55e':T.tx}}>{kycDocs.filter(k=>k.status==='verified').length}/{kycDocs.length}</div></div>
        </div>
        {eFlags.length>0&&<div style={{marginTop:16}}><div style={s.lbl}>Active Red Flags</div>{eFlags.map(f=><div key={f.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',fontSize:13}}><span style={{color:f.sev==='high'?'#ef4444':'#eab308'}}>🚩</span><span>{f.label}</span><Badge color={f.sev==='high'?'#ef4444':'#eab308'}>{f.sev}</Badge></div>)}</div>}
      </div>

      {/* ── Company Profile ── */}
      <div style={s.card}>
        <div className="section-hd">🏢 Company Profile</div>

        {entity.notes&&<div style={{marginTop:10,padding:12,background:T.sf2,borderRadius:8,fontSize:13,color:T.td}}><span style={{fontWeight:600}}>Notes:</span> {entity.notes}</div>}

    {/* ═══ CHECKS TAB ═══ */}

    {/* ═══ DOCS TAB ═══ */}

          <button style={{...s.btn,...s.bp,...s.sm,opacity:(pendingFiles.length||dTxt.trim())&&!aiL?1:0.4,whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6}} onClick={doFileScan} disabled={(!pendingFiles.length&&!dTxt.trim())||!!aiL}>
            {aiL==='d'?<>{extracting?'Extracting...':'Analyzing...'}<Spinner size={12}/></>:'🔍 Scan'}
          </button>
        </div>
        <FileDropZone onFiles={f=>setPendingFiles(p=>[...p,...f])} disabled={!!aiL}/>
        <FileChips files={pendingFiles} onRemove={i=>setPendingFiles(p=>p.filter((_,j)=>j!==i))}/>
        <div style={{marginTop:12}}><div style={{fontSize:11,color:T.td,textAlign:'center',marginBottom:8}}>— or paste text —</div><textarea style={s.ta} value={dTxt} onChange={e=>setDTxt(e.target.value)} placeholder="Paste document text..." disabled={!!aiL}/></div>
      </div>
      {(entity.docs||[]).length>0?(entity.docs||[]).map((d,i)=><div key={i} style={{padding:12,background:T.sf2,borderRadius:8,marginBottom:8}}>
        <div style={{...s.row,flexWrap:'wrap'}}><Badge color={RC[d.scanResult?.rating||'yellow']}>{d.type}</Badge><span style={{...s.mono,color:RC[d.scanResult?.rating||'yellow']}}>Score: {d.scanResult?.score||'N/A'}</span><span style={s.mut}>{new Date(d.date).toLocaleDateString()}</span>{d.fileName&&<span style={{...s.mut,fontStyle:'italic'}}>{d.fileName}</span>}</div>
        {d.scanResult?.summary&&<div style={{fontSize:13,color:'#bbb',marginTop:8}}>{d.scanResult.summary}</div>}
        {d.scanResult?.flags?.length>0&&<div style={{marginTop:8}}>{d.scanResult.flags.map((fl,j)=><span key={j} style={{...s.badge,background:'rgba(239,68,68,0.1)',color:'#ef4444',marginRight:4,marginBottom:4,fontSize:10}}>⚠ {fl}</span>)}</div>}
        {d.scanResult?.recommendations&&<div style={{fontSize:11,color:T.td,marginTop:8,padding:8,background:T.sf,borderRadius:4}}>💡 {d.scanResult.recommendations}</div>}

        <span style={{fontSize:14,fontWeight:600}}>Sanctions Screening</span>

        {sr.matches?.length>0&&<div style={{marginTop:8}}>{sr.matches.map((m,j)=><div key={j} style={{fontSize:12,padding:6,background:T.sf,borderRadius:4,marginBottom:4}}><span style={{fontWeight:600,color:'#ef4444'}}>{m.list}</span> — {m.matchType}: {m.details}</div>)}</div>}
        {sr.recommendation&&<div style={{...s.mut,marginTop:6}}>{sr.recommendation}</div>}
      </div>):<Empty icon="🛡️" title="No screenings yet" sub="Click Screen Now"/>}
    </div>}

    {/* ═══ AI TAB ═══ */}
    {tab==='ai'&&<div style={s.card}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <span style={{fontSize:14,fontWeight:600}}>AI Entity Verification</span>
        <button style={{...s.btn,...s.bp,...s.sm}} onClick={doVerify} disabled={!!aiL}>{aiL==='v'?<><Spinner size={12}/> Verifying...</>:'🤖 Verify Entity'}</button>
      </div>
      {aiR?.t==='v'&&<div style={{padding:16,background:T.sf2,borderRadius:8}}>
        <div style={s.row}><span style={{fontSize:14,fontWeight:600}}>Risk Score:</span><Badge color={RC[aiR.d.riskLevel==='low'?'green':aiR.d.riskLevel==='high'?'red':'yellow']}>{aiR.d.riskScore}/100 — {aiR.d.riskLevel}</Badge></div>
        {aiR.d.findings?.length>0&&<div style={{marginTop:12}}><span style={s.mut}>Findings:</span>{aiR.d.findings.map((f,i)=><div key={i} style={{fontSize:13,marginTop:4,paddingLeft:12,borderLeft:`2px solid ${T.gd}`}}>{f}</div>)}</div>}
        {aiR.d.recommendation&&<div style={{...s.mut,marginTop:12,padding:10,background:T.sf,borderRadius:6}}>{aiR.d.recommendation}</div>}
      </div>}
      {!aiR&&<Empty icon="🤖" title="AI Verification" sub="Click Verify Entity to run assessment"/>}
    </div>}

    {showReport&&<ReportModal entity={entity} report={report} onClose={()=>setShowReport(false)}/>}
  </div>;
}

// ── Compare ──
function Compare({entities}){
  const [sel,setSel]=useState([]);
  const tog=id=>setSel(p=>p.includes(id)?p.filter(x=>x!==id):p.length<4?[...p,id]:p);
  const picked=entities.filter(e=>sel.includes(e.id));
  return <div>
    <div style={s.card}><div style={{...s.mut,marginBottom:12}}>Select up to 4 entities to compare</div><div style={{display:'flex',flexWrap:'wrap',gap:8}}>{entities.map(e=><button key={e.id} style={{...s.btn,...s.sm,...(sel.includes(e.id)?s.bp:s.bs)}} onClick={()=>tog(e.id)}>{e.name}</button>)}</div></div>
    {picked.length>=2&&<div style={{...s.card,overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse'}}>
      <thead><tr><th style={{padding:'8px 14px',fontSize:11,fontWeight:600,color:T.td,textTransform:'uppercase',borderBottom:`1px solid ${T.bd}`,textAlign:'left'}}>Metric</th>{picked.map(e=><th key={e.id} style={{padding:'8px 14px',fontSize:11,fontWeight:600,color:T.td,textTransform:'uppercase',borderBottom:`1px solid ${T.bd}`,textAlign:'left'}}>{e.name}</th>)}</tr></thead>
      <tbody>{[
        {l:'Score',r:e=>{const sc=calcScore(e);return <span style={{color:RC[getRating(sc)],fontWeight:700,fontFamily:T.mn}}>{sc}</span>;}},
        {l:'Rating',r:e=>{const rt=getRating(calcScore(e));return <Badge color={RC[rt]}>{rt.toUpperCase()}</Badge>;}},
        {l:'Type',r:e=>ETYPES.find(t=>t.v===e.type)?.l},
        {l:'Country',r:e=>e.country||'—'},
        {l:'Red Flags',r:e=><span style={{color:(e.flags||[]).length>0?'#ef4444':'#22c55e'}}>{(e.flags||[]).length}</span>},
        {l:'Checks',r:e=>{const c=CHECKS.filter(x=>x.for.includes(e.type));return `${c.filter(x=>e.verifications?.[x.id]?.status==='pass').length}/${c.length}`;}},
        {l:'Docs',r:e=>(e.docs||[]).length},
        {l:'KYC',r:e=>{const k=e.kycDocs||[];return k.length?`${k.filter(x=>x.status==='verified').length}/${k.length}`:'—';}},
      ].map(row=><tr key={row.l}><td style={{padding:'10px 14px',fontSize:13,borderBottom:'1px solid rgba(255,255,255,0.03)',color:T.td}}>{row.l}</td>{picked.map(e=><td key={e.id} style={{padding:'10px 14px',fontSize:13,borderBottom:'1px solid rgba(255,255,255,0.03)'}}>{row.r(e)}</td>)}</tr>)}</tbody>
    </table></div>}
    {picked.length<2&&<Empty icon="⚖️" title="Select 2+ entities" sub="Pick entities above"/>}
  </div>;
}

// ── Main App ──
function App(){
  const [ents,setEnts]=useState(()=>{try{return JSON.parse(localStorage.getItem('td_entities')||'[]');}catch{return[];}});
  const [view,setView]=useState('list');
  const [active,setActive]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [search,setSearch]=useState('');

  useEffect(()=>{localStorage.setItem('td_entities',JSON.stringify(ents));},[ents]);

  const add=e=>setEnts(p=>[...p,e]);
  const upd=u=>setEnts(p=>p.map(e=>e.id===u.id?u:e));
  const del=id=>{setEnts(p=>p.filter(e=>e.id!==id));setView('list');setActive(null);};
  const open=e=>{setActive(e);setView('detail');};
  const filtered=ents.filter(e=>e.name.toLowerCase().includes(search.toLowerCase())||e.type.includes(search.toLowerCase()));

  return <div style={{fontFamily:T.fn,background:T.bg,color:T.tx,minHeight:'100vh'}}>
    <div style={s.hd}>
      <div style={{cursor:'pointer'}} onClick={()=>{setView('list');setActive(null);}}>
        <div style={s.logo}>◆ TRADE DILIGENCE</div>
        <div style={{fontSize:10,color:T.td,letterSpacing:'0.1em'}}>COMMODITY VERIFICATION PLATFORM</div>
      </div>
      <div style={s.row}>
        {ents.length>=2&&<button style={{...s.btn,...s.bs,...s.sm}} onClick={()=>setView(view==='compare'?'list':'compare')}>{view==='compare'?'← List':'⚖️ Compare'}</button>}
        <button style={{...s.btn,...s.bp,...s.sm}} onClick={()=>setShowAdd(true)}>+ Add</button>
      </div>
    </div>
    <div style={s.main}>
      {!hasKey()&&<div style={{...s.card,background:'rgba(234,179,8,0.06)',borderColor:'rgba(234,179,8,0.2)',marginBottom:16}}><div style={{fontSize:13,color:'#eab308'}}>⚠ <strong>AI features disabled.</strong> Add your API key in the HTML file (search for GKEY).</div></div>}
      {view==='compare'&&<Compare entities={ents}/>}
      {view==='detail'&&active&&<Detail entity={ents.find(e=>e.id===active.id)||active} onUpdate={upd} onBack={()=>{setView('list');setActive(null);}}/>}
      {view==='list'&&<>
        {ents.length>0&&<div style={{marginBottom:16}}><input style={s.inp} placeholder="Search entities..." value={search} onChange={e=>setSearch(e.target.value)}/></div>}
        {filtered.length>0?filtered.map(e=>{const sc=calcScore(e);const rt=getRating(sc);const ch=CHECKS.filter(c=>c.for.includes(e.type));const passed=ch.filter(c=>e.verifications?.[c.id]?.status==='pass').length;
          return <div key={e.id} style={{...s.card,cursor:'pointer',animation:'fadeUp 0.3s ease-out'}} onClick={()=>open(e)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>{e.name}</div>
                <div style={{...s.row,flexWrap:'wrap'}}><Badge color={T.g}>{ETYPES.find(t=>t.v===e.type)?.l}</Badge><Badge color={RC[rt]}>{rt.toUpperCase()}</Badge>{e.commodity&&<span style={s.mut}>{e.commodity}</span>}{e.country&&<span style={s.mut}>· {e.country}</span>}</div>
                <div style={{...s.row,marginTop:8}}>
                  <span style={{...s.mut,fontSize:11}}>✓ {passed}/{ch.length}</span>
                  <span style={{...s.mut,fontSize:11}}>🚩 {(e.flags||[]).length}</span>
                  <span style={{...s.mut,fontSize:11}}>📄 {(e.docs||[]).length}</span>
                  <span style={{...s.mut,fontSize:11}}>📋 {(e.kycDocs||[]).filter(k=>k.status==='verified').length}/{(e.kycDocs||[]).length} KYC</span>
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <ScoreCircle score={sc}/>
                <button style={{...s.btn,...s.bd,...s.sm,padding:'4px 8px',fontSize:11}} onClick={ev=>{ev.stopPropagation();if(confirm(`Delete ${e.name}?`))del(e.id);}}>✕</button>
              </div>
            </div>
          </div>;
        }):<Empty icon="◆" title="No entities yet" sub="Add a buyer, seller, or vessel to start vetting"/>}
      </>}
    </div>
    {showAdd&&<AddModal onAdd={add} onClose={()=>setShowAdd(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
